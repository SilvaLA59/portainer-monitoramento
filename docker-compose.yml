version: "3.8"

services:
  loki:
    image: grafana/loki:2.9.2
    # container_name removido para compatibilidade com Swarm/Scaling
    command: -config.file=/etc/loki/loki-config.yml
    # Portas removidas para não expor Loki publicamente (acesso apenas interno na rede)
    configs:
      - source: loki_config
        target: /etc/loki/loki-config.yml
    networks:
      - observability_net
    deploy:
      mode: replicated
      replicas: 1

  promtail:
    image: grafana/promtail:2.9.2
    # container_name removido para compatibilidade com Swarm/Global mode
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yml
    configs:
      - source: promtail_config
        target: /etc/promtail/promtail-config.yml
    networks:
      - observability_net
    deploy:
      mode: global

  grafana:
    image: grafana/grafana:10.4.2
    # container_name removido para evitar conflitos de nome
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ChangeStrongPassword
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yaml
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - observability_net
    deploy:
      mode: replicated
      replicas: 1

networks:
  observability_net:
    name: observability_net

volumes:
  grafana_data:
    name: grafana_data

configs:
  loki_config:
    file: ./loki-config.yml
  promtail_config:
    file: ./promtail-config.yml
  grafana_datasources:
    file: ./datasources.yml
